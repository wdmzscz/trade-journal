name: IBKR Daily Sync

on:
  schedule:
    # UTC 05:00 ≈ 美东 01:00（夏令时）/ 00:00（冬令时）
    # IBKR statement 通常过 00:30 才可用，故凌晨 1 点再同步
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase Edge Function
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.TRADE }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: VITE_SUPABASE_URL or CRON_SECRET not configured"
            exit 0
          fi
          curl -sf -X POST "${SUPABASE_URL}/functions/v1/sync-ibkr?interval=daily" \
            -H "x-cron-secret: ${CRON_SECRET}"
